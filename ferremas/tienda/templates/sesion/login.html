{% extends 'tienda/main.html' %}
{% load static %}
{% block content %}

{% load crispy_forms_tags %}


<h3>LOGIN</h3>

<br>

<form action="" method="post">
    {% csrf_token %}

    <div class="card mx-auto" style="width: 30rem;">
        <div class="card-body">
            <h5 class="card-title">Ingrese sus Credenciales</h5>
            {{ form | crispy }}

            <small id="emailHelp" class="form-text text-muted">¿No tienes una cuenta?
                <a href="{% url 'registro' %}">Registrarse</a>
            </small>
            <div class="text-center mt-3">
                <br>
                <button class="btn btn-sm btn-primary float-end" type="submit">Iniciar Sesión</button>
            </div>
        </div>
    </div>
</form>


{% endblock content %}
